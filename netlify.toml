[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Content-Security-Policy starter — uncomment on a DEPLOY PREVIEW first and
    # watch the browser console for violations before shipping to production.
    # Allows: self, Google Fonts (styles/fonts), Calendly (script + iframe).
    # Content-Security-Policy = "default-src 'self'; script-src 'self' https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://calendly.com; connect-src 'self'; base-uri 'self'; form-action 'self'"
